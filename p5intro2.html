<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Document</title>

	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>
</head>
<body>
	<script>
		function setup() {
			createCanvas(1500,1500);
			// noStroke()
		}

		function draw() {
			background("#FFF94F");
			for (let i = 0; i < 16; i++) {
				for(let j = 0; j < 16; j++) {
					let x = i * 100
					let y = j * 100

					let d = dist(x,y,mouseX,mouseY)




					fill("#41D3BD")
  					circle(x, y, 100);
  					fill("#FF0022")
  					circle(x,y,75);
  					fill("#791E94")
  					circle(x, y, 50);
  					fill("#FF88DC")
  					circle(x,y,25);
  					if (d<50) {
  						arc(x,y,50,50,0,PI)
  					}
  					// text(i + "," + j, x, y)
				}
			}
		
		}
	</script>
</body>
</html>
