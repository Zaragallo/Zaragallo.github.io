<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Document</title>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.min.js"></script>
</head>
<body>
	<script>
		let xpos
		let ypos
		let xspeed
		function setup() {
			createCanvas(800,800)
			xpos = width/2
			ypos = height/2
			xspeed = 5
			yspeed=8
			d = 50
			let circleColor = "white"
		}

		function draw() {
			background(200)

			d = getRandomDiameter(100,200)
	
			if (xpos + d/2 > width || xpos - d/2 < 0) {
				xspeed *= -1
			}

			if(ypos + d/2 > height || ypos - d/2 < 0){
				yspeed *= -1
			}
			changeBallColor("pink", "purple", "blue", "orange")
			// if(xpos > width/2 && ypos < height/2){
			// 	circleColor = "#AAEFDF"
			// } else{
			// 	circleColor = "#F8E5EE"
			// }


			xpos += xspeed
			ypos += yspeed
			// ypos = ypos + 8
			fill(circleColor)
			circle(xpos, ypos, d)
		}

		function getRandomDiameter(minSize, maxSize){
			let randomDiameter = random(minSize,maxSize)

			return randomDiameter
		}

		function changeBallColor(topRightColor, bottomRightColor, topLeftColor, bottomLeftColor) {
				if(xpos>width/2 && ypos<height/2){
					circleColor = topRightColor
				} else if (xpos > width/2 && ypos>height/2){
					circleColor= bottomRightColor
				} else if (xpos<width/2 && ypos<height/2){
					circleColor= topLeftColor
				} else {
					circleColor = bottomLeftColor
				}
		}
	</script>

</body>
</html>
