<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
#badbutton{
	position: absolute;
		}
	</style>
</head>
<body>
	<button id="badbutton">can't click me!</button>
	<script>
	let badbutton = document.getElementById("badbutton")
	badbutton.addEventListener("click", function(){
		console.log("click!")
	}) 
	badbutton.addEventListener("mouseover", function(){
		console.log("mouseover!")
		badbutton.style.top = Math.random() * 1000 + "px"
		badbutton.style.left = Math.random() * 700 + "px"
		badbutton.textContent = "hahaha"
		
	})
	badbutton.addEventListener("mouseout", function(){
		console.log("mouseout!")
		alert("You can't catch me")
		
	})


	</script>

</body>
</html>
