<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Document</title>
	<style>
		.container {
			display: grid;
			grid-template-columns: repeat(4, 1fr);
			gap: 16px;
		}

		.item img {
			width: 100%;
			height: 100;
			object-fit: cover;
		}

		@media (max-width: 800px){
			.container{
				grid-template-columns: 1fr;
			}
		}
	

	</style>
</head>
<body>
	<div class="container">
		<div class="item">
			<img src="paris.jpg" alt="paris">
		</div>
		<div class="item">
			<img src="newyork.jpg" alt="newyork">
		</div>
		<div class="item">
			<img src="london.avif" alt="london">
		</div>
		<div class="item">
			<img src="amalfi.webp" alt="amalfi">
		</div>
		<div class="item">
			<img src="maldives.jpg" alt="maldives">
		</div>
		<div class="item">
			<img src="venice.jpg" alt="venice">
		</div>
		<div class="item">
			<img src="tokyo.jpg" alt="tokyo">
		</div>
		<div class="item">
			<img src="courchevel.png" alt="courchevel">
		</div>
		<div class="item">
			<img src="barcelona.avif" alt="barcelona">
		</div>
		<div class="item">
			<img src="kenya.webp" alt="kenya">
		</div>
		<div class="item">
			<img src="fc.jpg" alt="fc">
		</div>
		<div class="item">
			<img src="munich.jpg" alt="munich">
		</div>
	</div>
</body>
</html>
